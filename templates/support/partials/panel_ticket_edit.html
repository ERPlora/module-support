{% load djicons i18n %}

<div x-data="{ confirmDelete: false }">

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Edit Ticket" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="edit-ticket-form"
          hx-post="{% url 'support:ticket_edit' obj.id %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Ticket Number" %}</label>
            <input type="text" name="ticket_number" class="input input-sm w-full" value="{{ obj.ticket_number }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Subject" %}</label>
            <input type="text" name="subject" class="input input-sm w-full" value="{{ obj.subject }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
            <textarea name="description" class="textarea textarea-sm w-full" rows="3">{{ obj.description }}</textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Priority" %}</label>
            <select name="priority" class="select select-sm w-full">
                <option value="">---</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">---</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Assigned To" %}</label>
            <input type="text" name="assigned_to" class="input input-sm w-full" value="{{ obj.assigned_to }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Assigned To Name" %}</label>
            <input type="text" name="assigned_to_name" class="input input-sm w-full" value="{{ obj.assigned_to_name }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Related Sale" %}</label>
            <input type="text" name="related_sale" class="input input-sm w-full" value="{{ obj.related_sale }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Related Product" %}</label>
            <input type="text" name="related_product" class="input input-sm w-full" value="{{ obj.related_product }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "First Response At" %}</label>
            <input type="datetime-local" name="first_response_at" class="input input-sm w-full" value="{{ obj.first_response_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Resolved At" %}</label>
            <input type="datetime-local" name="resolved_at" class="input input-sm w-full" value="{{ obj.resolved_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Closed At" %}</label>
            <input type="datetime-local" name="closed_at" class="input input-sm w-full" value="{{ obj.closed_at }}">
        </div>
    </form>

    <div class="border-t border-base-300 pt-4 mt-4 px-6 pb-6">
        <h4 class="font-semibold text-sm mb-3 text-error">{% trans "Danger Zone" %}</h4>
        <template x-if="!confirmDelete">
            <button type="button" class="btn btn-sm btn-outline color-error w-full" @click="confirmDelete = true">
                {% icon "trash-outline" %} {% trans "Delete" %}
            </button>
        </template>
        <template x-if="confirmDelete">
            <div>
                <p class="text-error text-sm font-semibold mb-3">{% trans "Are you sure?" %}</p>
                <div class="flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline flex-1" @click="confirmDelete = false">{% trans "Cancel" %}</button>
                    <button type="button" class="btn btn-sm color-error flex-1"
                            hx-post="{% url 'support:ticket_delete' obj.id %}"
                            hx-target="#datatable-body" hx-swap="innerHTML" @click="closePanel()">
                        {% icon "trash-outline" %} {% trans "Delete" %}
                    </button>
                </div>
            </div>
        </template>
    </div>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="edit-ticket-form" class="btn btn-sm color-primary">
            {% icon "checkmark-outline" %} {% trans "Save" %}
        </button>
    </div>
</div>

</div>
